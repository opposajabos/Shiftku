<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shiftku Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-orange: #FF9500;
            --ios-red: #FF3B30;
            --glass: rgba(255, 255, 255, 0.75);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #f2f2f7 0%, #e5e5ea 100%);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #1c1c1e;
        }

        .apple-glass {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Status Styles */
        .status-pagi { background: rgba(52, 199, 89, 0.15); color: var(--ios-green); }
        .status-malam { background: rgba(255, 149, 0, 0.15); color: var(--ios-orange); }
        .status-off { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); }

        .today-active {
            background: var(--ios-blue) !important;
            color: white !important;
            box-shadow: 0 8px 15px rgba(0, 122, 255, 0.3);
            transform: scale(1.05);
            z-index: 20;
        }

        /* Floating Nav */
        .nav-dock {
            box-shadow: 0 -5px 25px rgba(0,0,0,0.03);
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
        }

        /* Grid Logic */
        .day-cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 14px;
            transition: all 0.2s ease;
        }

        /* Animasi halu */
        @keyframes pulse-liquid {
            0% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.2; }
        }
        .liquid-bg { animation: pulse-liquid 4s infinite ease-in-out; }
    </style>
</head>
<body class="p-4 safe-top">

    <header class="flex justify-between items-center mb-4 px-2">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tighter">Shiftku</h1>
            <p id="headerDate" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">---</p>
        </div>
        <div class="apple-glass px-4 py-2 rounded-2xl flex items-center gap-2 border-none shadow-sm">
            <i class="fa-solid fa-users text-blue-500 text-xs"></i>
            <select id="teamSelect" onchange="saveTeamSelection()" class="bg-transparent text-sm font-bold focus:outline-none appearance-none">
                <option value="A">TEAM A</option>
                <option value="B">TEAM B</option>
                <option value="C">TEAM C</option>
            </select>
        </div>
    </header>

    <div id="heroCard" class="apple-glass rounded-[32px] p-6 mb-4 relative overflow-hidden flex-none shadow-sm">
        <div class="relative z-10">
            <span id="heroBadge" class="text-[9px] font-black px-3 py-1 rounded-full text-white uppercase tracking-wider mb-3 inline-block">
                Checking...
            </span>
            <h2 id="heroTitle" class="text-3xl font-extrabold tracking-tight mb-1">...</h2>
            <p id="heroSubtitle" class="text-sm font-medium text-gray-500 opacity-80 italic">Menyiapkan harimu...</p>
        </div>
        <div id="heroGradient" class="liquid-bg absolute -bottom-10 -right-10 w-40 h-40 rounded-full blur-3xl"></div>
    </div>

    <main class="apple-glass rounded-[32px] p-5 flex-grow flex flex-col shadow-sm mb-20 overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <button onclick="moveMonth(-1)" class="w-10 h-10 flex items-center justify-center rounded-full active:bg-white/50 transition-all">
                <i class="fa-solid fa-circle-chevron-left text-blue-500 text-xl"></i>
            </button>
            <div class="text-center">
                <h3 id="monthDisplay" class="text-lg font-extrabold">---</h3>
                <p id="yearDisplay" class="text-[10px] font-black text-gray-300 tracking-widest">2026</p>
            </div>
            <button onclick="moveMonth(1)" class="w-10 h-10 flex items-center justify-center rounded-full active:bg-white/50 transition-all">
                <i class="fa-solid fa-circle-chevron-right text-blue-500 text-xl"></i>
            </button>
        </div>

        <div class="flex-grow">
            <div class="grid grid-cols-7 gap-2 mb-2">
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Min</div>
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Sen</div>
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Sel</div>
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Rab</div>
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Kam</div>
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Jum</div>
                <div class="text-center text-[9px] font-black text-gray-300 uppercase">Sab</div>
            </div>
            <div id="daysGrid" class="grid grid-cols-7 gap-2">
                </div>
        </div>

        <div class="mt-auto border-t border-gray-100 flex gap-3 px-2">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-md bg-[#34C759]/20 border border-[#34C759]/30"></div>
                <span class="text-[10px] font-bold text-gray-400 uppercase">Pagi</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-md bg-[#FF9500]/20 border border-[#FF9500]/30"></div>
                <span class="text-[10px] font-bold text-gray-400 uppercase">Malam</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-md bg-[#FF3B30]/20 border border-[#FF3B30]/30"></div>
                <span class="text-[10px] font-bold text-gray-400 uppercase">Libur</span>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full px-6 nav-dock z-50">
<div class="apple-glass h-16 rounded-[24px] max-w-sm mx-auto flex items-center justify-around shadow-lg">
    <a href="index.html" class="flex flex-col items-center gap-1 text-blue-600"><i class="fa-solid fa-house-chimney text-lg"></i><span class="text-[9px] font-black">JADWAL</span></a>
    <a href="pulando.html" class="flex flex-col items-center gap-1 text-gray-400"><i class="fa-solid fa-camera-retro text-lg"></i><span class="text-[9px] font-black">PULANDO</span></a>
</div>
</nav>

    <script>
        // Gunakan Waktu Lokal Saat Ini
        let currentView = new Date();
        const REF_DATE = new Date(2026, 1, 13); // Referensi Shift
        const TEAM_MAP = { "C": 0, "A": 1, "B": 2 };
        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function saveTeamSelection() {
            localStorage.setItem('userTeamAlif', document.getElementById('teamSelect').value);
            render();
        }

        function loadTeamSelection() {
            const saved = localStorage.getItem('userTeamAlif') || "C";
            document.getElementById('teamSelect').value = saved;
        }

        function moveMonth(dir) {
            currentView.setMonth(currentView.getMonth() + dir);
            render();
        }

        function getShiftInfo(date, team) {
            const d1 = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
            const d2 = Date.UTC(REF_DATE.getFullYear(), REF_DATE.getMonth(), REF_DATE.getDate());
            const diff = Math.floor((d1 - d2) / 86400000);
            
            // Logika Modulo 3
            const idx = (((diff + TEAM_MAP[team]) % 3) + 3) % 3;
            
            return [
                { label: 'Pagi', class: 'status-pagi', title: 'Shift Pagi 🌅', sub: 'Gas pagi! Jangan telat.', color: '#34C759' },
                { label: 'Malam', class: 'status-malam', title: 'Shift Malam 🌙', sub: 'Semangat lembur, jaga fisik!', color: '#FF9500' },
                { label: 'Libur', class: 'status-off', title: 'Hari Libur 🏖️', sub: 'Nikmati waktumu, santai dulu.', color: '#FF3B30' }
            ][idx];
        }

        function render() {
            const team = document.getElementById('teamSelect').value;
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = "";

            const year = currentView.getFullYear();
            const month = currentView.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // Header Info
            document.getElementById('monthDisplay').innerText = monthNames[month];
            document.getElementById('yearDisplay').innerText = year;
            document.getElementById('headerDate').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}).toUpperCase();

            // Hero Today Info
            const today = new Date();
            const todayInfo = getShiftInfo(today, team);
            const hb = document.getElementById('heroBadge');
            
            document.getElementById('heroTitle').innerText = todayInfo.title;
            document.getElementById('heroSubtitle').innerText = todayInfo.sub;
            hb.innerText = todayInfo.label;
            hb.style.backgroundColor = todayInfo.color;
            document.getElementById('heroGradient').style.backgroundColor = todayInfo.color;

            // Fill Empty Grid
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

            // Render Days
            for(let d=1; d<=lastDate; d++) {
                const dateObj = new Date(year, month, d);
                const isToday = dateObj.toDateString() === today.toDateString();
                const info = getShiftInfo(dateObj, team);
                
                grid.innerHTML += `
                    <div class="day-cell ${isToday ? 'today-active' : info.class}">
                        ${d}
                    </div>`;
            }
        }

        // Initialize
        loadTeamSelection();
        render();
    </script>
</body>
</html>
