<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pulando Pro Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Roboto+Mono:wght@700&family=Oswald:wght@700&family=Inter:wght@800&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --ios-blue: #007AFF; --glass: rgba(255, 255, 255, 0.85); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #f2f2f7 0%, #e5e5ea 100%);
            height: 100dvh; overflow: hidden; display: flex; flex-direction: column; color: #1c1c1e;
        }
        .apple-glass { background: var(--glass); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); }
        .ios-input { background: rgba(0, 0, 0, 0.05); border: none; border-radius: 14px; padding: 12px 16px; font-weight: 600; font-size: 15px; width: 100%; -webkit-appearance: none; }
        
        /* Modal Style */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); justify-content: center; align-items: flex-end; }
        .modal-content { width: 100%; max-height: 85vh; background: white; border-top-left-radius: 35px; border-top-right-radius: 35px; padding: 25px; animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .pos-btn { width: 100%; aspect-ratio: 1/1; border-radius: 12px; border: 2px solid #f2f2f7; background: #f2f2f7; font-weight: 800; font-size: 10px; color: #8e8e93; transition: 0.2s; }
        .pos-btn.active { border-color: var(--ios-blue); background: var(--ios-blue); color: white; }

        #previewModal { background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); align-items: center; justify-content: center; padding: 15px; flex-direction: column; }
        #previewCanvas { max-width: 100%; max-height: 75vh; border-radius: 18px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        .close-btn-circle { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }

        .nav-dock { padding-bottom: calc(env(safe-area-inset-bottom) + 10px); }
        input[type="range"] { -webkit-appearance: none; height: 6px; background: #f2f2f7; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: white; border: 1px solid #ddd; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="p-4 safe-top">

    <header class="flex justify-between items-center mb-4 px-2">
        <h1 class="text-2xl font-extrabold tracking-tighter italic">Pulando <span class="text-blue-500">Elite</span></h1>
        <div class="text-[9px] font-black opacity-30 uppercase tracking-tighter">iOS Cloud Render</div>
    </header>

    <div class="flex gap-2 mb-4 flex-none">
        <div class="relative flex-1">
            <input type="text" id="areaInput" class="apple-glass ios-input !bg-white/60 shadow-sm" placeholder="Nama Area Laporan..." oninput="saveSettings()">
        </div>
        <button onclick="openSettings()" class="apple-glass w-[52px] h-[52px] rounded-[16px] flex items-center justify-center shadow-sm active:scale-90 transition-transform bg-blue-500/10">
            <i class="fa-solid fa-sliders text-blue-500 text-xl"></i>
        </button>
    </div>

    <div class="flex-none px-1">
        <label class="relative flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-gray-300 rounded-[22px] cursor-pointer bg-white/20 active:bg-white/40 transition-all">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cloud-arrow-up text-blue-500"></i>
                <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">Tambah Foto</span>
            </div>
            <input type="file" id="imageUpload" class="hidden" multiple accept="image/*" />
        </label>
    </div>

    <main id="imageList" class="flex-grow overflow-y-auto space-y-3 py-4 pb-44 px-1"></main>

    <div id="actionArea" class="hidden fixed bottom-24 left-0 w-full px-6 z-40">
        <button onclick="processAll()" class="w-full bg-blue-600 text-white font-extrabold py-4 rounded-[22px] shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fa-solid fa-check-double"></i>
            PROSES & SIMPAN
        </button>
    </div>

    <nav class="fixed bottom-0 left-0 w-full px-6 nav-dock z-50">
        <div class="apple-glass h-16 rounded-[24px] max-w-sm mx-auto flex items-center justify-around shadow-lg">
            <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400"><i class="fa-solid fa-house-chimney text-lg"></i><span class="text-[9px] font-black">JADWAL</span></a>
            <a href="pulando.html" class="flex flex-col items-center gap-1 text-blue-600"><i class="fa-solid fa-camera-retro text-lg"></i><span class="text-[9px] font-black">PULANDO</span></a>
        </div>
    </nav>

    <div id="settingsModal" class="modal-overlay" onclick="closeOnOutside(event)">
        <div class="modal-content shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <h2 class="text-xl font-extrabold tracking-tight mb-6">Watermark Styles</h2>
            <div class="space-y-6 pb-12">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Warna & Font</label>
                        <div class="flex gap-2">
                            <input type="color" id="textColor" class="w-12 h-12 border-none bg-transparent" onchange="saveSettings()">
                            <select id="fontFamily" class="ios-input py-2 bg-gray-100 text-sm" onchange="saveSettings()">
                                <option value="Plus Jakarta Sans">Jakarta</option>
                                <option value="Inter">Modern Inter</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Roboto Mono">Code Mono</option>
                                <option value="Oswald">Oswald Bold</option>
                                <option value="Playfair Display">Classy Serif</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">Posisi</label>
                        <div class="grid grid-cols-3 gap-1">
                            <button onclick="setPos('tl')" id="pos-tl" class="pos-btn">TL</button>
                            <button onclick="setPos('tc')" id="pos-tc" class="pos-btn">TC</button>
                            <button onclick="setPos('tr')" id="pos-tr" class="pos-btn">TR</button>
                            <button onclick="setPos('bl')" id="pos-bl" class="pos-btn">BL</button>
                            <button onclick="setPos('bc')" id="pos-bc" class="pos-btn">BC</button>
                            <button onclick="setPos('br')" id="pos-br" class="pos-btn">BR</button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="flex justify-between text-[10px] font-black text-gray-400 uppercase mb-2">Ukuran Teks <span id="sizeVal" class="text-blue-500">3.5%</span></label>
                    <input type="range" id="textSize" min="1" max="12" step="0.5" class="w-full" oninput="updateSizeDisplay(this.value)">
                </div>
                <button onclick="closeSettings()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl">Terapkan</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="modal-overlay">
        <canvas id="previewCanvas"></canvas>
        <button onclick="closePreview()" class="close-btn-circle mt-10 shadow-xl"><i class="fa-solid fa-xmark text-2xl"></i></button>
    </div>

    <canvas id="mainCanvas" class="hidden"></canvas>

    <script>
        let uploadedFiles = [];
        let currentPos = 'bl';

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('pulandoSettings')) || {
                area: "", color: "#ffffff", font: "Plus Jakarta Sans", pos: "bl", size: "3.5"
            };
            document.getElementById('areaInput').value = saved.area;
            document.getElementById('textColor').value = saved.color;
            document.getElementById('fontFamily').value = saved.font;
            document.getElementById('textSize').value = saved.size;
            updateSizeDisplay(saved.size);
            setPos(saved.pos);
        };

        function saveSettings() {
            const settings = {
                area: document.getElementById('areaInput').value,
                color: document.getElementById('textColor').value,
                font: document.getElementById('fontFamily').value,
                pos: currentPos,
                size: document.getElementById('textSize').value
            };
            localStorage.setItem('pulandoSettings', JSON.stringify(settings));
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function closeOnOutside(e) { if(e.target.id === 'settingsModal') closeSettings(); }
        function updateSizeDisplay(val) { document.getElementById('sizeVal').innerText = val + '%'; saveSettings(); }
        function setPos(pos) {
            currentPos = pos;
            document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`pos-${pos}`).classList.add('active');
            saveSettings();
        }

        imageUpload.onchange = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) document.getElementById('actionArea').classList.remove('hidden');
            files.forEach(file => {
                const id = Math.random().toString(36).substr(2, 9);
                const now = new Date();
                const timeStr = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.',':');
                const fileData = { id, file, time: timeStr, originalHour: now.getHours(), reader: new FileReader() };
                fileData.reader.onload = (ev) => {
                    const item = document.createElement('div');
                    item.className = "apple-glass p-3 rounded-2xl flex items-center gap-4 mx-1 animate-slideUp";
                    item.id = `item-${id}`;
                    item.innerHTML = `
                        <img src="${ev.target.result}" onclick="renderCanvas('${id}', 'previewCanvas')" class="w-16 h-16 object-cover rounded-[14px] shadow-sm active:scale-95 transition-all">
                        <div class="flex-1 flex justify-between items-center">
                            <div class="flex flex-col"><span class="text-[9px] font-black text-gray-400 uppercase">Set Jam</span>
                            <input type="time" class="font-bold text-blue-600 bg-transparent text-lg" value="${timeStr}" onchange="updateTime('${id}', this.value)"></div>
                            <button onclick="removeItem('${id}')" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                    document.getElementById('imageList').prepend(item);
                };
                fileData.reader.readAsDataURL(file);
                uploadedFiles.push(fileData);
            });
        };

        function updateTime(id, val) { uploadedFiles.find(f => f.id === id).time = val; }
        function removeItem(id) { 
            uploadedFiles = uploadedFiles.filter(f => f.id !== id); 
            document.getElementById(`item-${id}`).remove();
            if(uploadedFiles.length === 0) document.getElementById('actionArea').classList.add('hidden');
        }

        function getDynamicDate(originalHour, inputTime) {
            let d = new Date();
            const [newHour, newMin] = inputTime.split(':').map(Number);
            if (newHour < originalHour && (originalHour - newHour) > 12) d.setDate(d.getDate() + 1);
            else if (newHour > originalHour && (newHour - originalHour) > 12) d.setDate(d.getDate() - 1);
            return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function renderCanvas(id, targetId) {
            const item = uploadedFiles.find(f => f.id === id);
            const targetCanvas = document.getElementById(targetId);
            const ctx = targetCanvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                targetCanvas.width = img.width; targetCanvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const sets = JSON.parse(localStorage.getItem('pulandoSettings'));
                const fontSize = img.width * (sets.size / 100);
                ctx.font = `700 ${fontSize}px '${sets.font}'`;
                ctx.fillStyle = sets.color;
                ctx.shadowColor = "rgba(0,0,0,0.85)"; ctx.shadowBlur = fontSize/1.8;
                
                const dateText = getDynamicDate(item.originalHour, item.time);
                const fullText = `${dateText} pukul ${item.time.replace(':', '.')}`;
                let x = fontSize, y = fontSize * 2; ctx.textAlign = "left";
                
                if (sets.pos.includes('c')) { ctx.textAlign = "center"; x = img.width/2; }
                if (sets.pos.includes('r')) { ctx.textAlign = "right"; x = img.width - fontSize; }
                if (sets.pos.startsWith('b')) { y = img.height - fontSize; }

                if (sets.pos.startsWith('b')) {
                    ctx.fillText(fullText, x, y);
                    ctx.fillText(sets.area, x, y - (fontSize * 1.3));
                } else {
                    ctx.fillText(sets.area, x, y);
                    ctx.fillText(fullText, x, y + (fontSize * 1.3));
                }
                if(targetId === 'previewCanvas') document.getElementById('previewModal').style.display = 'flex';
            };
            img.src = item.reader.result;
        }

        function closePreview() { document.getElementById('previewModal').style.display = 'none'; }

        async function processAll() {
            for (const item of uploadedFiles) {
                renderCanvas(item.id, 'mainCanvas');
                await new Promise(r => setTimeout(r, 400));
                const link = document.createElement('a');
                link.download = `PULANDO_${item.time.replace(':','')}.jpg`;
                link.href = document.getElementById('mainCanvas').toDataURL('image/jpeg', 0.9);
                link.click();
            }
        }
    </script>
</body>
</html>
